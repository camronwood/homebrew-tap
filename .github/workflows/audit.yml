name: Audit casks

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  audit-cask:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Link checkout as local tap
        run: |
          TAP="$(brew --repository)/Library/Taps/camronwood/homebrew-tap"
          mkdir -p "$(dirname "$TAP")"
          rm -rf "$TAP"
          ln -s "$GITHUB_WORKSPACE" "$TAP"

      - name: Audit and style cask
        run: |
          brew update
          # Name-based args only — Homebrew disables `brew audit [path ...]`.
          # Skip --online/--strict on beta prereleases (expected until stable).
          brew audit --cask camronwood/tap/neural-junkie
          brew style --cask camronwood/tap/neural-junkie

  audit-formula:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@1f8e202ffddf94def7f42f6fa3a482e821489f9c

      - name: Audit and style Linux formula
        run: |
          # Skip --online/--strict on beta prereleases (expected until stable).
          brew audit --formula camronwood/tap/neural-junkie
          brew style --formula camronwood/tap/neural-junkie
